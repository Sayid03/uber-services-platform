services:
  db:
    image: postgres:16
    container_name: service_db
    environment:
      POSTGRES_DB: service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: service_redis
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service_web
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn core.wsgi:application -c gunicorn.conf.py"
    working_dir: /app/backend
    volumes:
      - .:/app
      - static_volume:/app/backend/staticfiles
      - media_volume:/app/backend/media
    expose:
      - "8000"
    env_file:
      - backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    depends_on:
      - db
      - redis
  
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service_celery
    command: celery -A core worker -l info
    working_dir: /app/backend
    volumes:
      - .:/app
    env_file:
      - backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    depends_on:
      - db
      - redis
  
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service_celery_beat
    command: celery -A core beat -l info
    working_dir: /app/backend
    volumes:
      - .:/app
    env_file:
      - backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    depends_on:
      - db
      - redis
  
  nginx:
    image: nginx:1.27-alpine
    container_name: service_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume: