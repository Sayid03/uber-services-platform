services:
  db:
    image: postgres:16
    container_name: service_db
    environment:
      POSTGRES_DB: service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d service_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: service_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service_web
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn core.wsgi:application -c gunicorn.conf.py"
    working_dir: /app/backend
    volumes:
      - .:/app
      - static_volume:/app/backend/staticfiles
      - media_volume:/app/backend/media
    expose:
      - "8000"
    env_file:
      - backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service_celery
    command: sh -c "sleep 20 && celery -A core worker -l info"
    working_dir: /app/backend
    volumes:
      - .:/app
    env_file:
      - backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    depends_on:
      - db
      - redis
  
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service_celery_beat
    command: sh -c "sleep 30 && celery -A core beat -l info"
    working_dir: /app/backend
    volumes:
      - .:/app
    env_file:
      - backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    depends_on:
      - db
      - redis
  
  nginx:
    image: nginx:1.27-alpine
    container_name: service_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - web
  
  certbot:
    image: certbot/certbot:latest
    container_name: service_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  postgres_data:
  static_volume:
  media_volume:
  certbot_www:
  certbot_conf: