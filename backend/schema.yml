openapi: 3.0.3
info:
  title: Local Freelance & Home Services Platform API
  version: 1.0.0
  description: API documentation for the Uber for Services BISP project backend.
paths:
  /api/bookings/:
    get:
      operationId: bookings_list
      description: |-
        GET: List bookings for the authenticated user.
        Customers see their bookings; providers see bookings for their services.
        POST: Create a new booking as a customer.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: provider
        schema:
          type: integer
      - in: query
        name: service
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - accepted
          - cancelled
          - completed
          - in_progress
          - pending
        description: |-
          * `pending` - Pending
          * `accepted` - Accepted
          * `in_progress` - In Progress
          * `completed` - Completed
          * `cancelled` - Cancelled
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBookingList'
          description: ''
    post:
      operationId: bookings_create
      description: |-
        GET: List bookings for the authenticated user.
        Customers see their bookings; providers see bookings for their services.
        POST: Create a new booking as a customer.
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Booking'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Booking'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Booking'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/bookings/{id}/:
    get:
      operationId: bookings_retrieve
      description: 'GET: Retrieve a booking only if the authenticated user is the
        customer or provider involved.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
          description: ''
  /api/bookings/{id}/status/:
    put:
      operationId: bookings_status_update
      description: 'PATCH: Update booking status as the provider assigned to that
        booking.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingStatusUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BookingStatusUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookingStatusUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingStatusUpdate'
          description: ''
    patch:
      operationId: bookings_status_partial_update
      description: 'PATCH: Update booking status as the provider assigned to that
        booking.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedBookingStatusUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedBookingStatusUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedBookingStatusUpdate'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingStatusUpdate'
          description: ''
  /api/reviews/:
    get:
      operationId: reviews_list
      description: |-
        GET: List reviews with optional filtering by provider, service, and rating.
        POST: Create a review as a customer for a completed booking.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: provider
        schema:
          type: integer
      - in: query
        name: rating
        schema:
          type: integer
      - in: query
        name: service
        schema:
          type: integer
      tags:
      - reviews
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedReviewList'
          description: ''
    post:
      operationId: reviews_create
      description: |-
        GET: List reviews with optional filtering by provider, service, and rating.
        POST: Create a review as a customer for a completed booking.
      tags:
      - reviews
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Review'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Review'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Review'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
          description: ''
  /api/reviews/{id}/:
    get:
      operationId: reviews_retrieve
      description: 'GET: Retrieve a single review.'
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - reviews
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
